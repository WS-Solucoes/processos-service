spring:
  application:
    name: processos-service
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
      file-size-threshold: 2KB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/erh
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      jdbc-url: jdbc:postgresql://${DB_HOST:localhost}:5432/erh
      auto-commit: false
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: processos
  sql:
    init:
      mode: always
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

springdoc:
  api-docs:
    path: /api-doc/docs
  swagger-ui:
    path: /api-doc/swagger.html

jwt:
  access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}
  private-key: classpath:keys/private_key.pem
  public-key: classpath:keys/public_key.pem

server:
  port: ${PROCESSOS_SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info

cors:
  allowed-origins: "${PROCESSOS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:9300,https://wsolucoes.com,https://www.wsolucoes.com}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${EUREKA_INSTANCE_INSTANCE_ID:${spring.application.name}:${server.port}}

file-storage:
  service:
    url: ${FILE_STORAGE_SERVICE_URL:http://localhost:9085}

processos:
  erh-service:
    url: ${PROCESSOS_ERH_SERVICE_URL:}
  demo-seed:
    enabled: ${PROCESSOS_DEMO_SEED_ENABLED:false}
  rabbit:
    exchange: ${PROCESSOS_RABBIT_EXCHANGE:processos.exchange}
    lifecycle-routing-key: ${PROCESSOS_RABBIT_LIFECYCLE_ROUTING_KEY:processo.lifecycle}
    integracao-routing-key: ${PROCESSOS_RABBIT_INTEGRACAO_ROUTING_KEY:processo.integracao.solicitada}
    integracao-resultado-routing-key: ${PROCESSOS_RABBIT_INTEGRACAO_RESULTADO_ROUTING_KEY:processo.integracao.resultado}
    lifecycle-queue: ${PROCESSOS_RABBIT_LIFECYCLE_QUEUE:processos.lifecycle.q}
    integracao-queue: ${PROCESSOS_RABBIT_INTEGRACAO_QUEUE:processos.integracao.solicitada.q}
    integracao-resultado-queue: ${PROCESSOS_RABBIT_INTEGRACAO_RESULTADO_QUEUE:processos.integracao.resultado.q}
    outbox-delay-ms: ${PROCESSOS_RABBIT_OUTBOX_DELAY_MS:5000}
